  <!-- ===  AD RESULT 2 === -->
  <rect x="40" y="220" width="420" height="68" rx="8" fill="#fffde7" stroke="#ffd54f" stroke-width="1.5"/>

  <rect x="52" y="230" width="56" height="14" rx="3" fill="#1a73e8"/>
  <text x="80" y="241" text-anchor="middle" fill="white" font-size="8" font-weight="bold" font-family="Arial, sans-serif">Patrocinado</text>

  <circle cx="122" cy="237" r="6" fill="#28a745"/>
  <text x="122" y="241" text-anchor="middle" fill="white" font-size="7" font-weight="bold" font-family="Arial">H</text>
  <text x="135" y="241" fill="#444" font-size="9" font-family="Arial, sans-serif">hidrotec-rj.com.br</text>

