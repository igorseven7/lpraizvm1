  <text x="48" y="125" fill="#4285F4" font-size="9" font-family="Arial, sans-serif">Tudo</text>
  <line x1="48" y1="132" x2="70" y2="132" stroke="#4285F4" stroke-width="2.5"/>
  <text x="80" y="125" fill="#555" font-size="9" font-family="Arial, sans-serif">Imagens</text>
