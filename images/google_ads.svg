  <rect x="30" y="44" width="540" height="14" fill="#f1f3f4"/>

  <!-- Traffic lights -->
  <circle cx="52" cy="39" r="5.5" fill="#ff5f57"/>
  <circle cx="70" cy="39" r="5.5" fill="#febc2e"/>
  <circle cx="88" cy="39" r="5.5" fill="#28c840"/>

  <!-- URL bar -->
  <rect x="110" y="29" width="380" height="20" rx="10" fill="white" stroke="#dadce0" stroke-width="1.5"/>
  <text x="300" y="43" text-anchor="middle" fill="#444" font-size="9.5" font-family="Arial, sans-serif">🔍  google.com/search?q=encanador+Rio+de+Janeiro</text>

  <!-- Google bar area -->
  <rect x="30" y="58" width="540" height="50" fill="white"/>

  <!-- Google logo -->
  <text x="60" y="90" fill="#4285F4" font-size="18" font-weight="bold" font-family="Arial, sans-serif">G</text>
  <text x="74" y="90" fill="#EA4335" font-size="18" font-weight="bold" font-family="Arial, sans-serif">o</text>
  <text x="87" y="90" fill="#FBBC05" font-size="18" font-weight="bold" font-family="Arial, sans-serif">o</text>
  <text x="100" y="90" fill="#4285F4" font-size="18" font-weight="bold" font-family="Arial, sans-serif">g</text>
  <text x="112" y="90" fill="#34A853" font-size="18" font-weight="bold" font-family="Arial, sans-serif">l</text>
  <text x="120" y="90" fill="#EA4335" font-size="18" font-weight="bold" font-family="Arial, sans-serif">e</text>

  <!-- Search bar -->
