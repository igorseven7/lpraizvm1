  <rect x="40" y="296" width="420" height="60" rx="6" fill="white" stroke="#e8e8e8" stroke-width="1"/>
  <circle cx="58" cy="312" r="6" fill="#e0e0e0"/>
  <text x="72" y="315" fill="#555" font-size="9" font-family="Arial, sans-serif">encanadornaordem.com.br</text>
  <text x="52" y="334" fill="#1a0dab" font-size="12" font-family="Arial, sans-serif">Encanador no Rio de Janeiro – Serviços Residenciais</text>
  <text x="52" y="348" fill="#666" font-size="8.5" font-family="Arial, sans-serif">Empresa com 10 anos de mercado. Atendemos toda a cidade...</text>

  <!-- Right sidebar - ads insight badge -->
  <rect x="475" y="140" width="85" height="110" rx="8" fill="#e8f0fe" stroke="#c5d8ff" stroke-width="1.5"/>
  <text x="517" y="160" text-anchor="middle" fill="#0047AB" font-size="8.5" font-weight="bold" font-family="Arial, sans-serif">Google Ads</text>
  <text x="517" y="178" text-anchor="middle" fill="#0047AB" font-size="20" font-family="Arial">📈</text>
  <text x="517" y="200" text-anchor="middle" fill="#333" font-size="8" font-family="Arial, sans-serif">Seu anúncio</text>
  <text x="517" y="214" text-anchor="middle" fill="#333" font-size="8" font-family="Arial, sans-serif">aparece aqui</text>
  <text x="517" y="230" text-anchor="middle" fill="#1d6ef5" font-size="8" font-weight="bold" font-family="Arial, sans-serif">no topo!</text>
</svg>
