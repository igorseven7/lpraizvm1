<svg viewBox="0 0 500 560" xmlns="http://www.w3.org/2000/svg" width="500" height="560">
  <defs>
    <linearGradient id="bgAbout" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f0fe"/>
      <stop offset="100%" style="stop-color:#dbeafe"/>
    </linearGradient>
    <linearGradient id="deskGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a574"/>
      <stop offset="100%" style="stop-color:#b8864e"/>
    </linearGradient>
    <linearGradient id="shirtGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0047AB"/>
      <stop offset="100%" style="stop-color:#003a8c"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0047AB"/>
      <stop offset="100%" style="stop-color:#1d6ef5"/>
    </linearGradient>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FDBCB4"/>
      <stop offset="100%" style="stop-color:#E8956D"/>
    </linearGradient>
    <filter id="aboutShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="rgba(0,71,171,0.15)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="560" fill="url(#bgAbout)" rx="16"/>

  <!-- Office wall / background elements -->
  <rect x="0" y="0" width="500" height="560" rx="16" fill="#f4f7ff"/>

  <!-- Decorative chart on wall -->
  <rect x="320" y="30" width="150" height="110" rx="8" fill="white" stroke="#e0e7ff" stroke-width="1.5"/>
  <text x="395" y="52" text-anchor="middle" fill="#0047AB" font-size="10" font-weight="bold" font-family="Arial, sans-serif">Crescimento Clientes</text>
  <!-- Bar chart -->
  <rect x="340" y="110" width="14" height="20" rx="2" fill="#c5d8ff"/>
  <rect x="360" y="95" width="14" height="35" rx="2" fill="#90b4f5"/>
  <rect x="380" y="78" width="14" height="52" rx="2" fill="#5b8ff9"/>
  <rect x="400" y="60" width="14" height="70" rx="2" fill="#0047AB"/>
  <rect x="420" y="45" width="14" height="85" rx="2" fill="#003a8c"/>
  <!-- Arrow up -->
  <text x="418" y="42" fill="#28a745" font-size="12" font-family="Arial">↗</text>
  <line x1="335" y1="132" x2="440" y2="132" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Trophy / award on shelf -->
  <rect x="28" y="50" width="90" height="90" rx="8" fill="white" stroke="#e0e7ff" stroke-width="1.5"/>
  <text x="73" y="90" text-anchor="middle" font-size="32" font-family="Arial">🏆</text>
  <text x="73" y="112" text-anchor="middle" fill="#0047AB" font-size="8.5" font-weight="bold" font-family="Arial, sans-serif">6+ Anos</text>
  <text x="73" y="126" text-anchor="middle" fill="#555" font-size="8" font-family="Arial, sans-serif">de Experiência</text>

  <!-- Plant decoration -->
  <rect x="422" y="175" width="10" height="40" rx="3" fill="#8B5E3C"/>
  <ellipse cx="427" cy="168" rx="22" ry="28" fill="#4CAF50"/>
  <ellipse cx="415" cy="180" rx="15" ry="20" fill="#45A049"/>
  <ellipse cx="440" cy="178" rx="15" ry="20" fill="#4CAF50"/>

  <!-- === PERSON === -->

  <!-- Chair back -->
  <rect x="150" y="290" width="200" height="180" rx="20" fill="#334155" opacity="0.9"/>
  <rect x="170" y="300" width="160" height="160" rx="15" fill="#475569"/>

  <!-- Body / Suit -->
  <ellipse cx="250" cy="390" rx="95" ry="110" fill="url(#shirtGrad)"/>

  <!-- Suit lapels -->
  <polygon points="220,300 250,360 250,300" fill="#003080"/>
  <polygon points="280,300 250,360 250,300" fill="#00409a"/>

  <!-- White shirt / tie -->
  <polygon points="235,305 250,370 265,305 250,310" fill="white"/>
  <polygon points="243,325 250,370 257,325 250,330" fill="#EA4335"/>

  <!-- Neck -->
  <rect x="235" y="265" width="30" height="40" rx="8" fill="url(#skinGrad)"/>

  <!-- Head -->
  <ellipse cx="250" cy="235" rx="65" ry="72" fill="url(#skinGrad)"/>

  <!-- Hair -->
  <ellipse cx="250" cy="175" rx="65" ry="30" fill="#2c1810"/>
  <rect x="185" y="175" width="130" height="30" fill="#2c1810"/>
  <ellipse cx="185" cy="200" rx="12" ry="20" fill="#2c1810"/>
  <ellipse cx="315" cy="200" rx="12" ry="20" fill="#2c1810"/>

  <!-- Ear left -->
  <ellipse cx="186" cy="238" rx="10" ry="13" fill="#E8956D"/>
  <!-- Ear right -->
  <ellipse cx="314" cy="238" rx="10" ry="13" fill="#E8956D"/>

  <!-- Eyes -->
  <ellipse cx="228" cy="232" rx="10" ry="11" fill="white"/>
  <ellipse cx="272" cy="232" rx="10" ry="11" fill="white"/>
  <circle cx="230" cy="233" r="7" fill="#3d2b1f"/>
  <circle cx="274" cy="233" r="7" fill="#3d2b1f"/>
  <circle cx="232" cy="231" r="2.5" fill="black"/>
  <circle cx="276" cy="231" r="2.5" fill="black"/>
  <circle cx="234" cy="229" r="1.2" fill="white"/>
  <circle cx="278" cy="229" r="1.2" fill="white"/>

  <!-- Eyebrows -->
  <path d="M 218 220 Q 228 215 238 218" stroke="#2c1810" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 262 218 Q 272 215 282 220" stroke="#2c1810" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <path d="M 248 242 Q 244 255 248 258 Q 252 261 256 258 Q 260 255 252 242" fill="#d4856a" stroke="none"/>

  <!-- Smile -->
  <path d="M 230 272 Q 250 285 270 272" stroke="#c0715a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 232 272 Q 250 282 268 272" fill="#e8956d" stroke="none" opacity="0.4"/>

  <!-- Beard / stubble hint -->
  <path d="M 220 268 Q 250 278 280 268" stroke="#3d2020" stroke-width="1" fill="none" opacity="0.25"/>

  <!-- Arms -->
  <!-- Left arm -->
  <path d="M 158 350 Q 130 380 120 430 L 150 440 Q 160 400 185 370 Z" fill="url(#shirtGrad)"/>
  <!-- Right arm -->
  <path d="M 342 350 Q 370 380 380 430 L 350 440 Q 340 400 315 370 Z" fill="url(#shirtGrad)"/>

  <!-- Left hand -->
  <ellipse cx="135" cy="445" rx="22" ry="16" fill="url(#skinGrad)"/>
  <!-- Right hand on laptop -->
  <ellipse cx="365" cy="445" rx="22" ry="16" fill="url(#skinGrad)"/>

  <!-- === DESK === -->
  <rect x="40" y="460" width="420" height="24" rx="6" fill="url(#deskGrad)"/>
  <rect x="60" y="480" width="20" height="60" rx="4" fill="#b8864e"/>
  <rect x="420" y="480" width="20" height="60" rx="4" fill="#b8864e"/>

  <!-- Laptop on desk -->
  <rect x="150" y="420" width="200" height="6" rx="2" fill="#1c1c2e"/>
  <rect x="148" y="426" width="204" height="4" rx="1" fill="#111"/>
  <!-- Laptop screen (open) -->
  <rect x="160" y="350" width="180" height="110" rx="6" fill="#1c1c2e"/>
  <rect x="165" y="355" width="170" height="100" rx="4" fill="url(#screenGrad)"/>
  <!-- Screen content -->
  <text x="250" y="385" text-anchor="middle" fill="white" font-size="9" font-weight="bold" font-family="Arial, sans-serif">Dashboard Clientes</text>
  <!-- Mini bar chart on screen -->
  <rect x="182" y="420" width="10" height="25" rx="2" fill="rgba(255,255,255,0.3)"/>
  <rect x="197" y="410" width="10" height="35" rx="2" fill="rgba(255,255,255,0.5)"/>
  <rect x="212" y="398" width="10" height="47" rx="2" fill="rgba(255,255,255,0.7)"/>
  <rect x="227" y="390" width="10" height="55" rx="2" fill="white"/>
  <!-- Green up arrow on screen -->
  <text x="255" y="415" fill="#7fffa0" font-size="14" font-family="Arial">↗</text>
  <text x="268" y="415" fill="white" font-size="9" font-weight="bold" font-family="Arial, sans-serif">+147%</text>
  <!-- Thin line below -->
  <line x1="182" y1="445" x2="315" y2="445" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>

  <!-- Coffee cup -->
  <rect x="370" y="435" width="30" height="24" rx="4" fill="white" stroke="#e0e0e0" stroke-width="1.5"/>
  <rect x="373" y="438" width="24" height="16" rx="2" fill="#c8a47a"/>
  <path d="M 400 445 Q 412 445 412 452 Q 412 459 400 459" stroke="#e0e0e0" stroke-width="2" fill="none"/>
  <!-- Steam -->
  <path d="M 380 432 Q 383 426 380 420" stroke="#ccc" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 388 430 Q 391 424 388 418" stroke="#ccc" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Notepad -->
  <rect x="95" y="435" width="48" height="24" rx="3" fill="white" stroke="#e0e0e0" stroke-width="1.5"/>
  <line x1="102" y1="443" x2="136" y2="443" stroke="#ccc" stroke-width="1"/>
  <line x1="102" y1="450" x2="136" y2="450" stroke="#ccc" stroke-width="1"/>
  <rect x="95" y="435" width="5" height="24" rx="1" fill="#0047AB" opacity="0.7"/>
</svg>
